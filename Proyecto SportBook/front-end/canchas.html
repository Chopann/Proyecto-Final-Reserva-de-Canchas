<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportReserve | Canchas Disponibles</title>

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SportReserve</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menuCanchas">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuCanchas">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard-user.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="canchas.html">Canchas</a></li>
                    <li class="nav-item"><a class="nav-link" href="reservar.html">Reservar</a></li>
                    <li class="nav-item"><a class="nav-link" href="mis-reservas.html">Mis Reservas</a></li>
                    <li class="nav-item"><a class="btn btn-warning ms-2" href="login.html">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <section class="container py-5">
        <div class="canchas-banner shadow rounded p-4 text-white text-center">
            <h1>Explora Nuestras Canchas</h1>
            <p>Consulta precios, superficies y disponibilidad.</p>
        </div>
    </section>

    <!-- FILTROS -->
    <section class="container pb-4">
        <div class="card shadow p-4">
            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">Tipo de superficie</label>
                    <select class="form-select" id="filtroSuperficie">
                        <option selected>Todas</option>
                        <option>Sintética</option>
                        <option>Cemento</option>
                        <option>Grass</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Estado</label>
                    <select class="form-select" id="filtroEstado">
                        <option selected>Todos</option>
                        <option>Disponible</option>
                        <option>Mantenimiento</option>
                    </select>
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-success w-100" id="btnFiltrarCanchas">Filtrar</button>
                </div>

            </div>
        </div>
    </section>

    <!-- LISTADO DE CANCHAS -->
    <section class="container pb-5">
        <div class="row g-4" id="listaCanchas">
            <div class="col-12 text-center">
                <p>Cargando canchas...</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-4">
        <p class="mb-0">© 2026 SportReserve | Gestión de Canchas</p>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
