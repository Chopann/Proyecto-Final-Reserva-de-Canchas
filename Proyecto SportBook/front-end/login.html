<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportReserve | Login</title>

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-success shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SportReserve</a>
        </div>
    </nav>

    <!-- LOGIN -->
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 login-card">

            <h2 class="text-center mb-4">Iniciar Sesión</h2>
            <div id="alertaContenedor"></div>

            <form id="loginForm">

                <!-- CORREO -->
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="correo" placeholder="ejemplo@email.com" required>
                </div>

                <!-- PASSWORD -->
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" required>
                </div>

                <!-- RECORDAR -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label">Recordarme</label>
                </div>

                <!-- BOTÓN -->
                <button type="submit" class="btn btn-success w-100">Ingresar</button>

                <!-- LINK REGISTRO -->
                <div class="text-center mt-3">
                    <p>¿No tienes cuenta? 
                        <a href="registro.html">Regístrate aquí</a>
                    </p>
                </div>

            </form>

        </div>
    </div>

    <!-- SCRIPT -->
    <script src="js/app.js"></script>

</body>
</html>
