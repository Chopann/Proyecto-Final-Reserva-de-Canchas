<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportReserve | Registro</title>

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-success shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SportReserve</a>
        </div>
    </nav>

    <!-- REGISTRO -->
    <div class="container d-flex justify-content-center align-items-center py-5">
        <div class="card shadow-lg p-4 register-card">

            <h2 class="text-center mb-4">Crear Cuenta</h2>
            <div id="alertaContenedor"></div>

            <form id="registroForm">

                <!-- NOMBRE -->
                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Tu nombre completo" required>
                </div>

                <!-- CORREO -->
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="correo" placeholder="ejemplo@email.com" required>
                </div>

                <!-- TELÉFONO -->
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" id="telefono" placeholder="Número de contacto">
                </div>

                <!-- CONTRASEÑA -->
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" required>
                </div>

                <!-- CONFIRMAR -->
                <div class="mb-3">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                </div>

                <!-- ROL OCULTO -->
                <input type="hidden" id="rol" value="cliente">

                <!-- TÉRMINOS -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terminos" required>
                    <label class="form-check-label">
                        Acepto términos y condiciones
                    </label>
                </div>

                <!-- BOTÓN -->
                <button type="submit" class="btn btn-success w-100">Registrarse</button>

                <!-- LOGIN -->
                <div class="text-center mt-3">
                    <p>¿Ya tienes cuenta? 
                        <a href="login.html">Inicia sesión aquí</a>
                    </p>
                </div>

            </form>

        </div>
    </div>

    <!-- SCRIPT -->
    <script src="js/app.js"></script>

</body>
</html>
