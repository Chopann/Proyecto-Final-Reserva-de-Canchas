# ==========================================
# SportBook - Configuración de la Aplicación
# NeuroCode Systems S.A.S
# ==========================================

# Servidor
server.port=8080
spring.application.name=sportbook

# ==========================================
# Base de Datos PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/Canchas_deportivas
spring.datasource.username=postgres
spring.datasource.password=JMTV2006
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT Configuración
# ==========================================
# IMPORTANTE: Cambiar este secret en producción (mínimo 256 bits)
jwt.secret=SportBookNeuroCodeSecretKey2026NeuroCodeSystemsSAS
jwt.expiration=86400000

# ==========================================
# CORS (permite peticiones desde el frontend)
# ==========================================
spring.web.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================
# Logs
# ==========================================
logging.level.com.neurocode.sportbook=DEBUG
logging.level.org.springframework.security=INFO
